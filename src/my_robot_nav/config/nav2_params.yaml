amcl:  # unused while mapping; kept for later if you switch to localization on a saved map
  ros__parameters:
    use_sim_time: false

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    default_bt_xml_filename: "navigate_w_replanning_and_recovery.xml"

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller/RegulatedPurePursuitController"
      desired_linear_vel: 0.12      # m/s (slow)
      max_linear_accel: 0.25
      max_linear_decel: 0.25
      max_angular_vel: 0.6
      lookahead_dist: 0.5
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.8
      regulate_linear_speed: true
      use_velocity_scaled_lookahead_dist: true
      transform_tolerance: 0.2

planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.1
      use_astar: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    plugin: "nav2_waypoint_follower::WaypointFollower"

# Costmaps assume no URDF: give a simple circular footprint and a single laser source
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 4.0
      height: 4.0
      resolution: 0.05
      robot_radius: 0.22    # <- set your robot radius (m)
      inflation_radius: 0.40
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        max_obstacle_height: 1.5
        origin_z: 0.0
        z_voxels: 8
        z_resolution: 0.2
        publish_voxel_map: false
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 1.5
          obstacle_range: 3.5
          raytrace_range: 4.0
          clearing: true
          marking: true
          data_type: "LaserScan"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.40

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      robot_radius: 0.22
      inflation_radius: 0.50
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: /scan
          obstacle_range: 4.0
          raytrace_range: 5.0
          clearing: true
          marking: true
          data_type: "LaserScan"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.50

map_server:
  ros__parameters:
    use_sim_time: false

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: false

# Make sure frames match your system
global_frame: "map"
robot_base_frame: "base_link"
odom_frame: "odom"

